<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farmer Registration | A&S Ventures</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <nav class="navbar">
    <div class="logo">
      <h2>A&S Ventures</h2>
    </div>

    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="marketplace.html">Marketplace</a></li>
    </ul>
  </nav>

  <section class="register-container">
    <div class="register-image">
      <img src="https://images.unsplash.com/photo-1500937386664-56d1dfef3854?w=1200" alt="Farmer" />
    </div>

    <div class="register-form">
      <h1>Farmer Registration</h1>

      <p>Join our marketplace and connect with buyers.</p>

      <form id="farmerForm">
        <input type="text" placeholder="Full Name" id="fullName" required />

        <input type="email" placeholder="Email Address" id="email" required />

        <input type="tel" placeholder="Phone Number" id="phoneNumber" required />

        <select id="accountType" required>
          <option value="">Select Account Type</option>
          <option value="Farmer">Farmer</option>
          <option value="Buyer">Buyer</option>
        </select>

        <input type="password" placeholder="Password" id="password" required />

        <input type="password" placeholder="Confirm Password" id="confirmPassword" required />

        <label>
          <input type="checkbox" id="showPassword">
          Show Password
        </label>

        <button type="submit">Create an Account</button>
      </form>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-content">
      <div>
        <h3>A&S Ventures</h3>
        <p>Connecting Farmers, Buyers & Markets.</p>
      </div>
    </div>
  </footer>
  <script src="script.js"></script>
</body>

</html>
