<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Farmer Confirmation | A&S Ventures</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #003300, #66cc66);
            color: #fff;
            margin: 0;
            padding: 0;
        }

        .confirm-container {
            max-width: 500px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .confirm-container::before {
            content: "";
            position: absolute;
            top: -30px;
            right: -30px;
            width: 90px;
            height: 90px;
            background: rgba(0, 128, 0, 0.3);
            border-radius: 50%;
            z-index: -1;
        }

        .confirm-container::after {
            content: "";
            position: absolute;
            bottom: -40px;
            left: -40px;
            width: 100px;
            height: 100px;
            background: rgba(0, 200, 0, 0.3);
            border-radius: 50%;
            z-index: -1;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        input,
        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }

        input {
            background: #fff;
            color: #333;
        }

        button {
            background: #006600;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #009900;
        }
    </style>
</head>

<body>
    <div class="confirm-container">
        <h1>Farmer Confirmation</h1>
        <form id="farmerConfirmForm">
            <input type="text" id="farmerName" placeholder="Full Name" required />
            <input type="tel" id="farmerPhone" placeholder="Phone Number" required />
            <input type="text" id="accountNumber" placeholder="Bank Account Number" required />
            <button type="submit">Confirm & Accept Order</button>
        </form>
    </div>
</body>
<script>
    async function updateOrderStatus(orderId, status) {
        const farmerName = document.getElementById("farmerName").value;
        const farmerPhone = document.getElementById("farmerPhone").value;
        const accountNumber = document.getElementById("accountNumber").value;

        if (!farmerName || !farmerPhone || !accountNumber) {
            alert("Please fill all fields before accepting the order.");
            return;
        }

        const token = localStorage.getItem("token");

        const res = await fetch(`https://a-s-ventures-backend.onrender.com/api/orders/${orderId}/status`, {
            method: "PATCH",
            headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`
            },
            body: JSON.stringify({ status, farmerName, farmerPhone, accountNumber })
        });

        const data = await res.json();
        alert(data.message);
    }
</script>

</html>
