<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buyer Dashboard | A&S Ventures</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <nav class="navbar">
      <div class="logo">
        <h2>A&S Ventures</h2>
      </div>

      <ul class="nav-links">
        <li><a href="marketplace.html">Marketplace</a></li>
        <li><a href="orders.html">Orders</a></li>
      </ul>
    </nav>

    <section class="dashboard-header">
      <h1>Buyer Dashboard</h1>

      <p>Manage your purchases and orders</p>
    </section>

    <section class="dashboard-stats">
      <div class="stat-card">
        <h2>15</h2>
        <p>Orders Placed</p>
      </div>

      <div class="stat-card">
        <h2>6</h2>
        <p>Active Orders</p>
      </div>

      <div class="stat-card">
        <h2>₦850,000</h2>
        <p>Total Purchases</p>
      </div>
    </section>

    <section class="my-products">
      <h2>Recommended Products</h2>

      <div class="product-grid">
        <div class="product-card">
          <img src="https://picsum.photos/300/200?21" />

          <h3>Rice</h3>

          <p>Kebbi State</p>

          <h4>₦420,000/Ton</h4>

          <a href="product-details.html">
            <button class="view-btn">View Details</button>
          </a>
        </div>

        <div class="product-card">
          <img src="https://picsum.photos/300/200?22" />

          <h3>Beans</h3>

          <p>Kaduna State</p>

          <h4>₦300,000/Ton</h4>

          <a href="product-details.html">
            <button class="view-btn">View Details</button>
          </a>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="footer-content">
        <h3>A&S Ventures</h3>
        <p>Connecting Farmers, Buyers & Markets.</p>
      </div>
    </footer>
  </body>
</html>
