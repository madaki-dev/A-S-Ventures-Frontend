<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Farmer Dashboard</title>

    <link rel="stylesheet" href="farmer-dashboard.css">

</head>

<body>

    <h1>Farmer Dashboard</h1>

    <div class="cards">

        <div class="card">

            <h3>Products Uploaded</h3>

            <h2 id="products">0</h2>

        </div>

        <div class="card">

            <h3>Orders Received</h3>

            <h2 id="orders">0</h2>

        </div>

        <div class="card">

            <h3>Revenue</h3>

            <h2 id="revenue">₦0</h2>

        </div>

    </div>

    <h2>Orders</h2>

    <table>

        <thead>

            <tr>

                <th>Buyer</th>

                <th>Phone</th>

                <th>WhatsApp</th>

                <th>Address</th>

                <th>Product</th>

                <th>Quantity</th>

                <th>My Price</th>

                <th>Commission</th>

                <th>Transport</th>

                <th>Buyer Paid</th>

                <th>Status</th>

            </tr>

        </thead>

        <tbody id="ordersTable">

        </tbody>

    </table>

    <script src="farmer-orders.js"></script>

</body>

</html>
