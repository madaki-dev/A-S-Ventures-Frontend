<!DOCTYPE html>
<html lang="en">

<head>
    <title>
        A&S Ventures| Profile Page
    </title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #004d00, #66cc66);
            color: #fff;
            margin: 0;
            padding: 0;
        }

        .profile-container {
            max-width: 600px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .profile-container::before {
            content: "";
            position: absolute;
            top: -40px;
            left: -40px;
            width: 100px;
            height: 100px;
            background: rgba(0, 128, 0, 0.3);
            border-radius: 50%;
            z-index: -1;
        }

        .profile-container::after {
            content: "";
            position: absolute;
            bottom: -30px;
            right: -30px;
            width: 80px;
            height: 80px;
            background: rgba(0, 200, 0, 0.3);
            border-radius: 50%;
            z-index: -1;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-info {
            margin-bottom: 20px;
        }

        .profile-info p {
            font-size: 18px;
            margin: 8px 0;
        }

        input[type="file"],
        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }

        input[type="file"] {
            background: #fff;
            color: #333;
        }

        button {
            background: #006600;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #009900;
        }

        .profile-pic {
            display: block;
            margin: 0 auto 20px;
            border-radius: 50%;
            width: 120px;
            height: 120px;
            object-fit: cover;
            border: 3px solid #fff;
        }
    </style>
</head>

<body>
    <div class="profile-container">
        <h1>User Profile</h1>
        <img id="profilePic" class="profile-pic" src="/uploads/default.png" alt="Profile Picture">
        <div class="profile-info">
            <p><strong>Name:</strong> <span id="userName"></span></p>
            <p><strong>Email:</strong> <span id="userEmail"></span></p>
            <p><strong>Account Type:</strong> <span id="userType"></span></p>
        </div>
        <form id="uploadForm">
            <input type="file" id="profileImage" accept="image/*" required>
            <button type="submit">Upload Profile Picture</button>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const token = localStorage.getItem("token");
            const res = await fetch("https://a-s-ventures-backend.onrender.com/api/profile", {
                headers: { Authorization: `Bearer ${token}` }
            });
            const user = await res.json();
            document.getElementById("userName").textContent = user.fullName;
            document.getElementById("userEmail").textContent = user.email;
            document.getElementById("userType").textContent = user.accountType;

            // Upload profile picture
            document.getElementById("uploadForm").addEventListener("submit", async (e) => {
                e.preventDefault();
                const formData = new FormData();
                formData.append("image", document.getElementById("profileImage").files[0]);

                const res = await fetch("https://a-s-ventures-backend.onrender.com/api/profile/upload-profile", {
                    method: "POST",
                    headers: { Authorization: `Bearer ${token}` },
                    body: formData
                });
                const data = await res.json();
                document.getElementById("profilePic").src = "/uploads/" + data.filename;
                alert(data.message);
            });
        });
    </script>
</body>

</html>
